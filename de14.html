<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ТЕСТ DOROS</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 300px; background: #16213e; color: #fff; border: 1px solid #0f3460; padding: 10px; }
        button { background: #0f3460; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; }
        iframe { width: 100%; height: 400px; background: white; border: 2px solid #0f3460; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>🔬 ТЕСТ ДЕКОДЕРА</h2>
    
    <textarea id="dorosCode" placeholder="DOROS код..."></textarea>
    <br>
    <button onclick="test()">🔓 ДЕКОДИРОВАТЬ И ЗАПУСТИТЬ</button>
    <button onclick="copy()">📋 КОПИРОВАТЬ РЕЗУЛЬТАТ</button>
    
    <iframe id="preview"></iframe>

    <script>
        const charToNum = {
            'A':'1','B':'4','C':'8','D':'5','E':'2','F':'6','G':'7','H':'9',
            'I':'14','J':'88','K':'52','L':'67','M':'69','N':'11','O':'44','P':'55',
            'Q':'22','R':'66','S':'77','T':'99','U':'15','V':'26','W':'47','X':'58',
            'Y':'79','Z':'96','a':'1','b':'4','c':'8','d':'5','e':'2','f':'6',
            'g':'7','h':'9','i':'14','j':'88','k':'52','l':'67','m':'69','n':'11',
            'o':'44','p':'55','q':'22','r':'66','s':'77','t':'99','u':'15','v':'26',
            'w':'47','x':'58','y':'79','z':'96'
        };
        
        const numToChar = {};
        for(let c in charToNum) numToChar[charToNum[c]] = c;

        function decode(text) {
            let result = '';
            let i = 0;
            while(i < text.length) {
                if(text[i] >= '0' && text[i] <= '9') {
                    let num = '';
                    while(i < text.length && text[i] >= '0' && text[i] <= '9') {
                        num += text[i];
                        i++;
                    }
                    if(text[i] === ',') i++;
                    result += numToChar[num] || num;
                } else {
                    result += text[i];
                    i++;
                }
            }
            return result;
        }

        function test() {
            const code = document.getElementById('dorosCode').value;
            const html = decode(code);
            document.getElementById('preview').srcdoc = html;
        }

        function copy() {
            const code = document.getElementById('dorosCode').value;
            const html = decode(code);
            navigator.clipboard.writeText(html);
            alert('Скопировано!');
        }
    </script>
</body>
</html>
