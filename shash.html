<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ШАШКИ 3000 ⚡ DOROSfamd EDITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0c0f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Анимированный фон в стиле FAMD */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.05) 0%, transparent 50%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            animation: bgMove 30s linear infinite;
            z-index: 0;
        }

        @keyframes bgMove {
            0% { transform: translate(-10%, -10%) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(5deg); }
        }

        /* Главный контейнер — теперь всё супер стильно */
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            display: flex;
            gap: 40px;
            position: relative;
            z-index: 2;
            background: rgba(12, 15, 25, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 80px;
            padding: 40px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,215,0,0.2), 0 0 60px rgba(255,215,0,0.2);
        }

        /* Левая часть с доской */
        .board-area {
            flex: 2;
            min-width: 600px;
        }

        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 20px;
        }

        .turn-box {
            background: linear-gradient(135deg, #1e1e3f, #13132b);
            border: 2px solid #ffd700;
            border-radius: 60px;
            padding: 15px 40px;
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
        }

        .turn-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
        }

        .pieces-count {
            display: flex;
            gap: 30px;
            font-size: 2rem;
            font-weight: 800;
            background: rgba(0,0,0,0.5);
            padding: 15px 40px;
            border-radius: 60px;
            border: 2px solid #ffd700;
        }

        .white-count {
            color: #fff;
            text-shadow: 0 0 20px #00f;
        }
        
        .black-count {
            color: #000;
            text-shadow: 0 0 20px #f00;
            -webkit-text-stroke: 1px #fff;
        }

        /* Игровое поле — теперь идеальное */
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            aspect-ratio: 1/1;
            background: #2c2c2c;
            border-radius: 40px;
            overflow: hidden;
            border: 8px solid #ffd700;
            box-shadow: 0 30px 40px rgba(0,0,0,0.8), 0 0 100px rgba(255,215,0,0.3);
            transition: 0.3s;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1/1;
            cursor: pointer;
            position: relative;
            transition: 0.1s;
        }

        .cell.light {
            background: #e9d5b5;
        }

        .cell.dark {
            background: #7a5d3c;
        }

        .cell.available::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(0, 255, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 30px #0f0, 0 0 60px #0f0;
            animation: pulse 1s ease infinite;
            z-index: 10;
        }

        .cell.selected {
            box-shadow: inset 0 0 0 4px cyan, 0 0 30px cyan;
        }

        .cell.last-move {
            box-shadow: inset 0 0 0 4px #ffd700;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Фигуры — с кастомным дизайном FAMD */
        .piece {
            width: 75%;
            height: 75%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            transition: 0.2s;
            border: 3px solid #fff;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 0 30px currentColor;
            cursor: pointer;
            z-index: 5;
        }

        .piece.white {
            background: radial-gradient(circle at 35% 35%, #ffffff, #b0b0b0);
            color: #333;
            box-shadow: 0 6px 0 #666, 0 0 40px #00f;
        }

        .piece.black {
            background: radial-gradient(circle at 35% 35%, #333, #000);
            color: #ccc;
            box-shadow: 0 6px 0 #111, 0 0 40px #f00;
        }

        .piece.king::after {
            content: '♔';
            font-size: 1.8rem;
            filter: drop-shadow(0 0 10px gold);
            position: absolute;
        }

        .piece:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* Правая панель управления — ультра стиль */
        .control-panel {
            flex: 1;
            background: linear-gradient(145deg, #14182b, #0a0d1a);
            border-radius: 70px;
            padding: 40px 30px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3), inset 0 0 30px rgba(255,215,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .famd-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            line-height: 1.2;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffd700, #ff69b4, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.5));
            letter-spacing: 5px;
        }

        .mode-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 25px;
            border: 2px solid rgba(255, 215, 0, 0.3);
        }

        .section-label {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
        }

        .mode-btn {
            flex: 1;
            background: #1e233b;
            border: 2px solid #4a4e6b;
            color: #a0a5c0;
            font-size: 1.4rem;
            font-weight: 800;
            padding: 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #ffd700, #ffb347);
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 40px #ffd700;
            transform: scale(1.02);
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .diff-btn {
            background: #1a1e30;
            border: 2px solid #3a3f5a;
            color: #b0b5d0;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .diff-btn.active {
            background: #ffd700;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 30px #ffd700;
            transform: scale(1.05);
        }

        .new-game-btn {
            background: linear-gradient(145deg, #d42d2d, #a51b1b);
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: 900;
            padding: 25px;
            border-radius: 60px;
            cursor: pointer;
            border: 3px solid #ffd700;
            box-shadow: 0 10px 0 #4a0000, 0 0 50px #ff0000;
            transition: 0.1s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .new-game-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #4a0000, 0 0 80px #ff0000;
        }

        .stats-panel {
            display: flex;
            justify-content: space-around;
            background: #0b0e17;
            border-radius: 40px;
            padding: 20px;
            border: 2px solid #ffd700;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2.8rem;
            font-weight: 900;
            color: #ffd700;
        }

        .stat-label {
            color: #fff;
            font-size: 1.2rem;
        }

        .credits {
            text-align: center;
            color: #6a6e8a;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .credits span {
            color: #ffd700;
            font-weight: 900;
            font-size: 1.5rem;
        }

        /* Анимации для захвата */
        .capture-animation {
            animation: captureFlash 0.3s ease;
        }

        @keyframes captureFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(2) drop-shadow(0 0 20px red); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="board-area">
        <div class="board-header">
            <div class="turn-box">
                <div class="turn-text" id="turnDisplay">⚪ ХОД БЕЛЫХ</div>
            </div>
            <div class="pieces-count">
                <div class="white-count" id="whiteCountDisplay">⚪ 12</div>
                <div class="black-count" id="blackCountDisplay">⚫ 12</div>
            </div>
        </div>
        <div id="board" class="board"></div>
    </div>

    <div class="control-panel">
        <div class="famd-title">
            DOROS<br>FAMD
        </div>

        <div class="mode-section">
            <div class="section-label">🎮 РЕЖИМ</div>
            <div class="mode-buttons">
                <button class="mode-btn active" data-mode="ai">🤖 AI</button>
                <button class="mode-btn" data-mode="2p">👥 2P</button>
            </div>
        </div>

        <div class="mode-section" id="difficultySection">
            <div class="section-label">⚡ СЛОЖНОСТЬ</div>
            <div class="difficulty-grid">
                <button class="diff-btn" data-diff="easy">🍼 ЛЕГКО</button>
                <button class="diff-btn active" data-diff="medium">🔥 СРЕДНЕ</button>
                <button class="diff-btn" data-diff="hard">💀 СЛОЖНО</button>
                <button class="diff-btn" data-diff="insane">👽 НЕВЕРОЯТНО</button>
            </div>
        </div>

        <button class="new-game-btn" id="newGameBtn">
            🔥 НОВАЯ ИГРА 🔥
        </button>

        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-value" id="whiteWins">0</div>
                <div class="stat-label">ПОБЕД ⚪</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="blackWins">0</div>
                <div class="stat-label">ПОБЕД ⚫</div>
            </div>
        </div>

        <div class="credits">
            <span>DOROSfamd</span> × <span>FAMD</span> × <span>MUZfamd</span><br>
            ШАШКИ НОВОГО ПОКОЛЕНИЯ
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== СОСТОЯНИЕ ====================
        let board = [];
        let currentPlayer = 'white'; // white или black
        let selectedRow = -1, selectedCol = -1;
        let gameMode = 'ai';
        let difficulty = 'medium';
        let gameOver = false;
        let winner = null;
        
        // Для множественного взятия
        let mustContinueCapture = false;
        let captureChainFromRow = -1, captureChainFromCol = -1;
        
        // Статистика
        let whiteWins = 0, blackWins = 0;
        
        // Последний ход (для подсветки)
        let lastMoveFrom = null;
        let lastMoveTo = null;

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function initBoard() {
            board = Array(8).fill().map(() => Array(8).fill(null));
            
            // Черные сверху (строки 0-2)
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        board[row][col] = { color: 'black', isKing: false };
                    }
                }
            }
            
            // Белые снизу (строки 5-7)
            for (let row = 5; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) {
                        board[row][col] = { color: 'white', isKing: false };
                    }
                }
            }
            
            currentPlayer = 'white';
            selectedRow = -1;
            selectedCol = -1;
            gameOver = false;
            winner = null;
            mustContinueCapture = false;
            captureChainFromRow = -1;
            captureChainFromCol = -1;
            lastMoveFrom = null;
            lastMoveTo = null;
            
            updateCountsAndTurn();
            renderBoard();
        }

        // ==================== ПОДСЧЕТ ФИГУР ====================
        function updateCountsAndTurn() {
            let white = 0, black = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c]) {
                        if (board[r][c].color === 'white') white++;
                        else black++;
                    }
                }
            }
            
            document.getElementById('whiteCountDisplay').innerHTML = `⚪ ${white}`;
            document.getElementById('blackCountDisplay').innerHTML = `⚫ ${black}`;
            
            // Проверка на конец игры
            if (white === 0) {
                gameOver = true;
                winner = 'black';
                blackWins++;
                document.getElementById('blackWins').textContent = blackWins;
                document.getElementById('turnDisplay').innerHTML = '⚫ ПОБЕДА ЧЕРНЫХ';
            } else if (black === 0) {
                gameOver = true;
                winner = 'white';
                whiteWins++;
                document.getElementById('whiteWins').textContent = whiteWins;
                document.getElementById('turnDisplay').innerHTML = '⚪ ПОБЕДА БЕЛЫХ';
            } else if (!gameOver) {
                document.getElementById('turnDisplay').innerHTML = 
                    currentPlayer === 'white' ? '⚪ ХОД БЕЛЫХ' : '⚫ ХОД ЧЕРНЫХ';
            }
            
            return { white, black };
        }

        // ==================== ПРОВЕРКА ВЗЯТИЙ (ОБЯЗАТЕЛЬНЫЕ) ====================
        function hasAnyCapture(color) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] && board[r][c].color === color) {
                        let captures = getCaptureMoves(r, c, true);
                        if (captures.length > 0) return true;
                    }
                }
            }
            return false;
        }

        // ==================== ПОЛУЧИТЬ ВСЕ ВОЗМОЖНЫЕ ВЗЯТИЯ ДЛЯ КЛЕТКИ ====================
        function getCaptureMoves(row, col, ignoreColorCheck = false) {
            if (!ignoreColorCheck && (!board[row][col] || board[row][col].color !== currentPlayer)) return [];
            
            let piece = board[row][col];
            if (!piece) return [];
            
            let captures = [];
            let directions = [];
            
            if (piece.color === 'white' || piece.isKing) {
                directions.push([-1, -1], [-1, 1]); // вверх
            }
            if (piece.color === 'black' || piece.isKing) {
                directions.push([1, -1], [1, 1]); // вниз
            }
            
            for (let [dr, dc] of directions) {
                let midRow = row + dr;
                let midCol = col + dc;
                let targetRow = row + 2 * dr;
                let targetCol = col + 2 * dc;
                
                if (targetRow >= 0 && targetRow < 8 && targetCol >= 0 && targetCol < 8) {
                    if (board[midRow] && board[midRow][midCol] && 
                        board[midRow][midCol].color !== piece.color &&
                        board[targetRow][targetCol] === null) {
                        
                        captures.push({
                            from: { row, col },
                            to: { row: targetRow, col: targetCol },
                            captured: { row: midRow, col: midCol }
                        });
                    }
                }
            }
            
            return captures;
        }

        // ==================== ПОЛУЧИТЬ ПРОСТЫЕ ХОДЫ (НЕ ВЗЯТИЯ) ====================
        function getSimpleMoves(row, col) {
            if (!board[row][col] || board[row][col].color !== currentPlayer) return [];
            
            let piece = board[row][col];
            let moves = [];
            let directions = [];
            
            if (piece.color === 'white' || piece.isKing) {
                directions.push([-1, -1], [-1, 1]);
            }
            if (piece.color === 'black' || piece.isKing) {
                directions.push([1, -1], [1, 1]);
            }
            
            for (let [dr, dc] of directions) {
                let newRow = row + dr;
                let newCol = col + dc;
                
                if (newRow >= 0 && newRow < 8 && newCol >= 0 && newCol < 8 && !board[newRow][newCol]) {
                    moves.push({ row: newRow, col: newCol });
                }
            }
            
            return moves;
        }

        // ==================== ВЫПОЛНЕНИЕ ХОДА ====================
        function makeMove(fromRow, fromCol, toRow, toCol, captured) {
            let piece = { ...board[fromRow][fromCol] };
            
            // Сохраняем для подсветки
            lastMoveFrom = { row: fromRow, col: fromCol };
            lastMoveTo = { row: toRow, col: toCol };
            
            // Убираем старую фигуру
            board[fromRow][fromCol] = null;
            
            // Если было взятие - убираем съеденную
            if (captured) {
                board[captured.row][captured.col] = null;
            }
            
            // Проверка на дамку
            if ((piece.color === 'white' && toRow === 0) || (piece.color === 'black' && toRow === 7)) {
                piece.isKing = true;
            }
            
            // Ставим фигуру на новое место
            board[toRow][toCol] = piece;
            
            // Проверяем, можно ли продолжать взятие этой же фигурой
            if (captured) {
                let furtherCaptures = getCaptureMoves(toRow, toCol, true);
                if (furtherCaptures.length > 0) {
                    // Продолжаем цепочку взятий
                    mustContinueCapture = true;
                    captureChainFromRow = toRow;
                    captureChainFromCol = toCol;
                    selectedRow = toRow;
                    selectedCol = toCol;
                    renderBoard();
                    updateCountsAndTurn();
                    return true; // Не меняем игрока
                }
            }
            
            // Если не продолжаем взятие - сбрасываем цепочку и меняем игрока
            mustContinueCapture = false;
            captureChainFromRow = -1;
            captureChainFromCol = -1;
            selectedRow = -1;
            selectedCol = -1;
            
            // Меняем игрока
            currentPlayer = currentPlayer === 'white' ? 'black' : 'white';
            
            updateCountsAndTurn();
            renderBoard();
            
            // Если режим AI и сейчас ход черных - ходит AI
            if (gameMode === 'ai' && currentPlayer === 'black' && !gameOver) {
                setTimeout(() => aiMakeMove(), 300);
            }
            
            return true;
        }

        // ==================== ОБРАБОТКА КЛИКА ====================
        function handleClick(row, col) {
            if (gameOver) return;
            
            // В AI режиме нельзя ходить за черных
            if (gameMode === 'ai' && currentPlayer === 'black') return;
            
            // Режим продолжения взятия
            if (mustContinueCapture) {
                if (row === captureChainFromRow && col === captureChainFromCol) {
                    // Та же фигура - снимаем выделение
                    selectedRow = -1;
                    selectedCol = -1;
                    renderBoard();
                } else {
                    // Проверяем, можем ли бить этой фигурой
                    let captures = getCaptureMoves(captureChainFromRow, captureChainFromCol, true);
                    let validCapture = captures.find(c => c.to.row === row && c.to.col === col);
                    
                    if (validCapture) {
                        makeMove(
                            captureChainFromRow, 
                            captureChainFromCol, 
                            row, 
                            col, 
                            validCapture.captured
                        );
                    } else {
                        // Неправильный ход - снимаем выделение
                        mustContinueCapture = false;
                        captureChainFromRow = -1;
                        captureChainFromCol = -1;
                        selectedRow = -1;
                        selectedCol = -1;
                        renderBoard();
                    }
                }
                return;
            }
            
            // Обычный режим (не цепочка взятий)
            
            // Если есть выбранная фигура
            if (selectedRow !== -1 && selectedCol !== -1) {
                let hasCaptures = hasAnyCapture(currentPlayer);
                
                // Получаем возможные ходы для выбранной фигуры
                let captures = getCaptureMoves(selectedRow, selectedCol, true);
                let simpleMoves = getSimpleMoves(selectedRow, selectedCol);
                
                // Проверяем, кликнули ли на доступную клетку
                let captureMove = captures.find(c => c.to.row === row && c.to.col === col);
                let simpleMove = simpleMoves.find(m => m.row === row && m.col === col);
                
                if (captureMove) {
                    // Ход со взятием
                    makeMove(selectedRow, selectedCol, row, col, captureMove.captured);
                } else if (simpleMove && !hasCaptures) {
                    // Простой ход (только если нет обязательных взятий)
                    makeMove(selectedRow, selectedCol, row, col, null);
                } else {
                    // Кликнули не на доступную клетку
                    if (board[row] && board[row][col] && board[row][col].color === currentPlayer) {
                        // Выбираем другую свою фигуру
                        selectedRow = row;
                        selectedCol = col;
                        renderBoard();
                    } else {
                        // Снимаем выделение
                        selectedRow = -1;
                        selectedCol = -1;
                        renderBoard();
                    }
                }
            } else {
                // Нет выбранной фигуры
                if (board[row] && board[row][col] && board[row][col].color === currentPlayer) {
                    // Выбираем фигуру
                    selectedRow = row;
                    selectedCol = col;
                    renderBoard();
                }
            }
        }

        // ==================== AI ХОД ====================
        function aiMakeMove() {
            if (gameOver || currentPlayer !== 'black' || gameMode !== 'ai') return;
            
            // Сначала ищем все возможные взятия
            let allCaptures = [];
            let allSimpleMoves = [];
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] && board[r][c].color === 'black') {
                        let captures = getCaptureMoves(r, c, true);
                        let simples = getSimpleMoves(r, c);
                        
                        captures.forEach(cap => {
                            allCaptures.push({
                                from: { row: r, col: c },
                                to: cap.to,
                                captured: cap.captured
                            });
                        });
                        
                        simples.forEach(sim => {
                            allSimpleMoves.push({
                                from: { row: r, col: c },
                                to: { row: sim.row, col: sim.col },
                                captured: null
                            });
                        });
                    }
                }
            }
            
            let selectedMove = null;
            
            if (allCaptures.length > 0) {
                // Обязательное взятие
                if (difficulty === 'easy') {
                    // Легкий - иногда пропускает взятия
                    if (Math.random() > 0.3) {
                        selectedMove = allCaptures[Math.floor(Math.random() * allCaptures.length)];
                    } else {
                        // Может сходить просто так, если есть простые ходы
                        if (allSimpleMoves.length > 0) {
                            selectedMove = allSimpleMoves[Math.floor(Math.random() * allSimpleMoves.length)];
                        } else {
                            selectedMove = allCaptures[Math.floor(Math.random() * allCaptures.length)];
                        }
                    }
                } else if (difficulty === 'medium') {
                    // Средний - всегда бьет, но случайную фигуру
                    selectedMove = allCaptures[Math.floor(Math.random() * allCaptures.length)];
                } else if (difficulty === 'hard') {
                    // Сложный - выбирает взятие, которое съедает больше (для этого надо рекурсивно считать, но упростим)
                    // Пока просто бьет первую попавшуюся
                    selectedMove = allCaptures[0];
                } else { // insane
                    // Невероятно - пытается предсказать, но пока тоже просто бьет случайно
                    selectedMove = allCaptures[Math.floor(Math.random() * allCaptures.length)];
                }
            } else if (allSimpleMoves.length > 0) {
                // Простые ходы
                if (difficulty === 'easy') {
                    selectedMove = allSimpleMoves[Math.floor(Math.random() * allSimpleMoves.length)];
                } else if (difficulty === 'medium') {
                    selectedMove = allSimpleMoves[Math.floor(Math.random() * allSimpleMoves.length)];
                } else if (difficulty === 'hard') {
                    // Выбирает ход ближе к центру (примитивно)
                    allSimpleMoves.sort((a, b) => {
                        let distA = Math.abs(a.to.row - 3.5) + Math.abs(a.to.col - 3.5);
                        let distB = Math.abs(b.to.row - 3.5) + Math.abs(b.to.col - 3.5);
                        return distA - distB;
                    });
                    selectedMove = allSimpleMoves[0];
                } else {
                    selectedMove = allSimpleMoves[Math.floor(Math.random() * allSimpleMoves.length)];
                }
            }
            
            if (selectedMove) {
                makeMove(
                    selectedMove.from.row, 
                    selectedMove.from.col, 
                    selectedMove.to.row, 
                    selectedMove.to.col, 
                    selectedMove.captured
                );
            } else {
                // Нет ходов - пропуск или поражение
                currentPlayer = 'white';
                updateCountsAndTurn();
                renderBoard();
            }
        }

        // ==================== ОТРИСОВКА ====================
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            // Проверяем обязательные взятия для подсветки
            let mandatoryCaptures = hasAnyCapture(currentPlayer);
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    
                    // Подсветка последнего хода
                    if (lastMoveFrom && lastMoveFrom.row === r && lastMoveFrom.col === c) {
                        cell.classList.add('last-move');
                    }
                    if (lastMoveTo && lastMoveTo.row === r && lastMoveTo.col === c) {
                        cell.classList.add('last-move');
                    }
                    
                    // Подсветка выбранной клетки
                    if (selectedRow === r && selectedCol === c) {
                        cell.classList.add('selected');
                    }
                    
                    // Подсветка доступных ходов
                    if (selectedRow !== -1 && selectedCol !== -1 && board[selectedRow] && board[selectedRow][selectedCol]) {
                        if (!mustContinueCapture || (selectedRow === captureChainFromRow && selectedCol === captureChainFromCol)) {
                            let captures = getCaptureMoves(selectedRow, selectedCol, true);
                            let simpleMoves = getSimpleMoves(selectedRow, selectedCol);
                            
                            // Если есть обязательные взятия, показываем только их
                            if (mandatoryCaptures) {
                                captures.forEach(cap => {
                                    if (cap.to.row === r && cap.to.col === c) {
                                        cell.classList.add('available');
                                    }
                                });
                            } else {
                                captures.forEach(cap => {
                                    if (cap.to.row === r && cap.to.col === c) {
                                        cell.classList.add('available');
                                    }
                                });
                                simpleMoves.forEach(move => {
                                    if (move.row === r && move.col === c) {
                                        cell.classList.add('available');
                                    }
                                });
                            }
                        }
                    }
                    
                    // Фигура
                    if (board[r] && board[r][c]) {
                        const piece = board[r][c];
                        const pieceDiv = document.createElement('div');
                        pieceDiv.className = `piece ${piece.color}`;
                        if (piece.isKing) {
                            pieceDiv.classList.add('king');
                        }
                        cell.appendChild(pieceDiv);
                    }
                    
                    cell.addEventListener('click', (function(row, col) {
                        return function() { handleClick(row, col); };
                    })(r, c));
                    
                    boardEl.appendChild(cell);
                }
            }
        }

        // ==================== НАСТРОЙКА ИНТЕРФЕЙСА ====================
        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                gameMode = btn.dataset.mode;
                
                // Показываем/скрываем сложность
                document.getElementById('difficultySection').style.display = 
                    gameMode === 'ai' ? 'block' : 'none';
                
                initBoard();
            });
        });

        document.querySelectorAll('[data-diff]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.diff;
            });
        });

        document.getElementById('newGameBtn').addEventListener('click', () => {
            initBoard();
        });

        // Старт
        initBoard();
    })();
</script>
